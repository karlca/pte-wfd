<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin - PTE WFD v3</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>const API = (window.location.hostname === "localhost") ? "http://localhost:3001/api" : "/api";</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif; background:#f5f5f5; color:#333; }
.container { max-width:1000px; margin:0 auto; padding:24px 16px; }
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; padding-bottom:16px; border-bottom:2px solid #e0e0e0; gap:16px; }
.header h1 { font-size:22px; }
.btn { padding:8px 16px; border:1px solid #ccc; border-radius:6px; cursor:pointer; font-size:14px; background:#fff; }
.btn-primary { background:#1a73e8; color:#fff; border-color:#1a73e8; }
.btn-danger { background:#d32f2f; color:#fff; border-color:#d32f2f; }
.btn-sm { font-size:12px; padding:4px 10px; }
.btn:hover { opacity:.85; }
.login-box { max-width:360px; margin:80px auto; background:#fff; padding:32px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); text-align:center; }
.login-box h2 { margin-bottom:20px; }
.login-box input { width:100%; padding:10px 12px; border:1px solid #d0d0d0; border-radius:8px; font-size:14px; margin-bottom:12px; outline:none; }
.login-box input:focus { border-color:#1a73e8; }
.error { color:#d32f2f; font-size:13px; margin-bottom:10px; }
table { width:100%; background:#fff; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.06); border-collapse:collapse; font-size:13px; }
th,td { padding:10px 14px; text-align:left; border-bottom:1px solid #f0f0f0; }
th { background:#fafafa; font-weight:600; color:#555; }
.loading { text-align:center; padding:40px; color:#888; }
.course-row { background:#fff; border-radius:8px; margin-bottom:8px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
.course-header { padding:10px 14px; cursor:pointer; border-bottom:1px solid #f0f0f0; }
.course-header:hover { background:#fafafa; }
.sentence-list { padding:14px; }
.sentence-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #f5f5f5; }
.dialog-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; z-index:999; }
.dialog-box { background:#fff; border-radius:12px; padding:24px; width:420px; max-width:90%; }
.dialog-box h3 { margin-bottom:16px; }
.dialog-box input { width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; margin-bottom:8px; font-size:14px; }
.course-form { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.course-form input { padding:6px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px; }
</style>
</head>
<body>
<div id="app">
  <div v-if="!loggedIn" class="login-box">
    <h2>Admin Login</h2>
    <input v-model="password" type="password" placeholder="Admin password" @keyup.enter="doLogin" />
    <div v-if="error" class="error">{{ error }}</div>
    <button class="btn btn-primary" @click="doLogin" style="width:100%">Login</button>
  </div>

  <div v-else class="container">
    <div class="header">
      <h1>Admin Dashboard</h1>
      <button class="btn" @click="doLogout">Logout</button>
    </div>

    <div class="course-form">
      <input v-model="newCourseName" placeholder="Course name" />
      <input v-model="newCourseDesc" placeholder="Description" style="flex:1" />
      <input v-model="newCoursePrice" type="number" placeholder="Price (0=free)" style="width:100px" min="0" />
      <button class="btn btn-primary btn-sm" @click="createCourse" :disabled="!newCourseName.trim()">Add Course</button>
    </div>

    <div v-if="loading" class="loading">Loading...</div>

    <div v-for="c in courseList" :key="c.id" class="course-row">
      <div class="course-header" @click="toggleCourse(c)" style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <span style="font-weight:600">{{ c.name }}</span>
          <span v-if="c.description" style="font-size:12px;color:#888;margin-left:8px">{{ c.description }}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:13px;color:#1a73e8;font-weight:600">{{ c.price > 0 ? '$' + c.price : 'Free' }}</span>
          <span style="font-size:11px;color:#aaa">{{ c.sentenceCount || 0 }} sentences</span>
          <button class="btn btn-sm" @click.stop="editCourseDialog(c)">Edit</button>
          <button class="btn btn-sm" @click.stop="translateCourse(c)" :disabled="translatingId === c.id" style="background:#f0f0f0">{{ translatingId === c.id ? '...' : 'T' }}</button>
          <button class="btn btn-danger btn-sm" @click.stop="deleteCourse(c)">Del</button>
        </div>
      </div>
      <div v-if="expandedId === c.id" class="sentence-list">
        <div v-for="s in (c.sentences||[])" :key="s.id" class="sentence-item">
          <span style="font-size:11px;color:#888;min-width:36px">#{{ s.id }}</span>
          <div style="flex:1">
            <input :value="s.title" @change="updateSentence(s,$event.target.value)" style="width:100%;padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px" placeholder="English" />
            <input :value="s.translation||''" @change="updateSentenceTrans(s,$event.target.value)" style="width:100%;padding:4px 8px;border:1px solid #eee;border-radius:4px;font-size:12px;color:#666;background:#fafafa;margin-top:3px" placeholder="Chinese" />
          </div>
          <button class="btn btn-danger btn-sm" @click="deleteSentence(c,s)">Del</button>
        </div>
        <div v-if="!c.sentences || c.sentences.length===0" style="color:#aaa;font-size:12px;padding:8px 0">No sentences</div>
        <div style="display:flex;gap:8px;margin-top:10px">
          <div style="flex:1;display:flex;flex-direction:column;gap:4px">
            <input v-model="newSentText[c.id]" placeholder="English sentence" style="padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px" @keyup.enter="addSentence(c)" />
            <input v-model="newSentTrans[c.id]" placeholder="Chinese (optional)" style="padding:6px 10px;border:1px solid #eee;border-radius:6px;font-size:12px;color:#888" />
          </div>
          <button class="btn btn-primary btn-sm" @click="addSentence(c)">Add</button>
        </div>
      </div>
    </div>

    <!-- Edit Dialog -->
    <div v-if="showEditDialog" class="dialog-overlay" @click.self="showEditDialog=false">
      <div class="dialog-box">
        <h3>Edit Course</h3>
        <input v-model="editName" placeholder="Name" />
        <input v-model="editDesc" placeholder="Description" />
        <input v-model="editPrice" type="number" placeholder="Price" min="0" />
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
          <button class="btn" @click="showEditDialog=false">Cancel</button>
          <button class="btn btn-primary" @click="saveCourseEdit">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp, ref, reactive } = Vue;
createApp({
  setup() {
    const loggedIn = ref(!!localStorage.getItem("admin_token"));
    const password = ref(""); const error = ref(""); const loading = ref(false);
    const courseList = ref([]); const expandedId = ref(null);
    const newCourseName = ref(""); const newCourseDesc = ref(""); const newCoursePrice = ref(0);
    const showEditDialog = ref(false); const editName = ref(""); const editDesc = ref(""); const editPrice = ref(0);
    const editingCourse = ref(null); const translatingId = ref(null);
    const newSentText = ref({}); const newSentTrans = ref({});

    async function doLogin() {
      error.value = "";
      const res = await fetch(API + "/admin/login", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({password:password.value}) });
      const data = await res.json();
      if (!res.ok) { error.value = data.error; return; }
      localStorage.setItem("admin_token", data.token);
      loggedIn.value = true; loadCourses();
    }
    function doLogout() { localStorage.removeItem("admin_token"); loggedIn.value = false; }

    async function loadCourses() {
      loading.value = true;
      try {
        const res = await fetch(API + "/courses");
        courseList.value = await res.json();
        courseList.value.forEach(c => { c.sentences = []; c.sentenceCount = 0; });
        for (const c of courseList.value) {
          try {
            const sr = await fetch(API + "/courses/" + c.id + "/sentences");
            c.sentences = await sr.json();
            c.sentenceCount = c.sentences.length;
          } catch(e) {}
        }
      } catch(e) {}
      loading.value = false;
    }

    async function createCourse() {
      if (!newCourseName.value.trim()) return;
      const t = localStorage.getItem("admin_token");
      await fetch(API + "/admin/courses", { method:"POST", headers:{"Content-Type":"application/json",Authorization:"Bearer "+t}, body:JSON.stringify({name:newCourseName.value.trim(),description:newCourseDesc.value.trim(),price:newCoursePrice.value||0}) });
      newCourseName.value = ""; newCourseDesc.value = ""; newCoursePrice.value = 0;
      await loadCourses();
    }

    async function toggleCourse(c) {
      expandedId.value = expandedId.value === c.id ? null : c.id;
    }

    async function editCourseDialog(c) {
      editingCourse.value = c; editName.value = c.name; editDesc.value = c.description||""; editPrice.value = c.price||0;
      showEditDialog.value = true;
    }

    async function saveCourseEdit() {
      const t = localStorage.getItem("admin_token");
      await fetch(API + "/admin/courses/"+editingCourse.value.id, { method:"PUT", headers:{"Content-Type":"application/json",Authorization:"Bearer "+t}, body:JSON.stringify({name:editName.value,description:editDesc.value,price:editPrice.value||0}) });
      editingCourse.value.name = editName.value; editingCourse.value.description = editDesc.value; editingCourse.value.price = editPrice.value;
      showEditDialog.value = false;
    }

    async function deleteCourse(c) {
      if (!confirm("Delete "+c.name+" and all sentences?")) return;
      const t = localStorage.getItem("admin_token");
      await fetch(API + "/admin/courses/"+c.id, { method:"DELETE", headers:{Authorization:"Bearer "+t} });
      await loadCourses();
    }

    async function translateCourse(c) {
      if (!confirm("Auto-translate missing translations?")) return;
      translatingId.value = c.id;
      try {
        const t = localStorage.getItem("admin_token");
        const res = await fetch(API + "/admin/courses/"+c.id+"/translate", { method:"POST", headers:{Authorization:"Bearer "+t} });
        const r = await res.json();
        alert("Translated "+r.translated+" / "+r.total);
        const sr = await fetch(API + "/courses/"+c.id+"/sentences");
        c.sentences = await sr.json();
        c.sentenceCount = c.sentences.length;
      } catch(e) { alert("Translation failed"); }
      translatingId.value = null;
    }

    async function addSentence(c) {
      const text = (newSentText.value[c.id]||"").trim();
      if (!text) return;
      const t = localStorage.getItem("admin_token");
      await fetch(API + "/admin/courses/"+c.id+"/sentences", { method:"POST", headers:{"Content-Type":"application/json",Authorization:"Bearer "+t}, body:JSON.stringify({title:text,translation:newSentTrans.value[c.id]||"",degree:1,category:"basic"}) });
      newSentText.value[c.id] = ""; newSentTrans.value[c.id] = ""; c.sentenceCount = (c.sentenceCount||0)+1;
      const sr = await fetch(API + "/courses/"+c.id+"/sentences");
      c.sentences = await sr.json();
    }

    async function updateSentence(s, v) {
      const t = localStorage.getItem("admin_token");
      await fetch(API + "/admin/sentences/"+s.id, { method:"PUT", headers:{"Content-Type":"application/json",Authorization:"Bearer "+t}, body:JSON.stringify({title:v,translation:s.translation||""}) });
      s.title = v;
    }

    async function updateSentenceTrans(s, v) {
      const t = localStorage.getItem("admin_token");
      await fetch(API + "/admin/sentences/"+s.id, { method:"PUT", headers:{"Content-Type":"application/json",Authorization:"Bearer "+t}, body:JSON.stringify({title:s.title,translation:v}) });
      s.translation = v;
    }

    async function deleteSentence(c, s) {
      if (!confirm("Delete this sentence?")) return;
      const t = localStorage.getItem("admin_token");
      await fetch(API + "/admin/sentences/"+s.id, { method:"DELETE", headers:{Authorization:"Bearer "+t} });
      c.sentences = c.sentences.filter(x => x.id !== s.id); c.sentenceCount = c.sentences.length;
    }

    if (loggedIn.value) loadCourses();

    return { loggedIn,password,error,loading,courseList,expandedId,newCourseName,newCourseDesc,newCoursePrice,showEditDialog,editName,editDesc,editPrice,translatingId,newSentText,newSentTrans,doLogin,doLogout,createCourse,toggleCourse,editCourseDialog,saveCourseEdit,deleteCourse,translateCourse,addSentence,updateSentence,updateSentenceTrans,deleteSentence };
  }
}).mount("#app");
</script>
</body>
</html>
